<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>霓虹幸存者 | Neon Survivor</title>
    <meta name="description" content="一款网页端的弹幕生存动作肉鸽游戏" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
      <!-- 主菜单 -->
      <div id="main-menu" class="screen active">
        <div class="menu-content">
          <div class="title-deco">
            <div class="title-line left"></div>
            <div class="title-icon">
              <svg viewBox="0 0 24 24" width="32" height="32">
                <path d="M12 2l2 8 8-2-6 6 6 6-8-2-2 8-2-8-8 2 6-6-6-6 8 2 2-8z" fill="#00f0ff" opacity="0.8"/>
                <circle cx="12" cy="12" r="3" fill="#fff"/>
              </svg>
            </div>
            <div class="title-line right"></div>
          </div>
          <h1 class="title-glow">霓虹幸存者</h1>
          <p class="subtitle">在几何虫群中生存下去</p>
          
          <!-- 难度选择 -->
          <div class="difficulty-selector">
            <span class="diff-label">难度</span>
            <div class="diff-buttons">
              <button class="diff-btn" data-diff="easy">
                <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="8" fill="none" stroke="#44ff88" stroke-width="1.5"/><path d="M8 12l3 3 5-6" stroke="#44ff88" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
                简单
              </button>
              <button class="diff-btn active" data-diff="normal">
                <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="8" fill="none" stroke="#ffcc00" stroke-width="1.5"/><path d="M8 12h8" stroke="#ffcc00" stroke-width="1.5" stroke-linecap="round"/></svg>
                中等
              </button>
              <button class="diff-btn" data-diff="hard">
                <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="8" fill="none" stroke="#ff003c" stroke-width="1.5"/><path d="M12 8v5M12 15v1" stroke="#ff003c" stroke-width="1.5" stroke-linecap="round"/></svg>
                困难
              </button>
            </div>
          </div>

          <button id="start-btn" class="glow-on-hover">单人开始</button>
          <div class="team-buttons">
            <button id="create-room-btn" class="glow-on-hover team-btn">创建房间</button>
            <button id="join-room-btn" class="glow-on-hover team-btn">加入房间</button>
          </div>
          <button id="meta-upgrade-btn" class="glow-on-hover meta-btn"><svg viewBox="0 0 24 24" width="16" height="16" style="vertical-align:middle"><circle cx="12" cy="12" r="9" fill="#ffcc00" opacity="0.9"/><text x="12" y="16" text-anchor="middle" font-size="12" fill="#996600" font-weight="bold">$</text></svg> 永久强化 <span id="gold-display">0</span></button>
          <div class="controls-hint">
            <span>
              <svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;opacity:0.5">
                <rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="#888" stroke-width="1.5"/>
                <path d="M8 12h8M12 8v8" stroke="#888" stroke-width="1.5"/>
              </svg>
              WASD / 方向键 移动
            </span>
            <span>
              <svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;opacity:0.5">
                <circle cx="12" cy="12" r="8" fill="none" stroke="#888" stroke-width="1.5"/>
                <circle cx="12" cy="12" r="2" fill="#888"/>
              </svg>
              武器自动攻击
            </span>
          </div>
        </div>
      </div>

      <!-- 游戏内 HUD -->
      <div id="hud" class="screen hidden">
        <div class="hud-top">
          <div class="hud-top-left">
            <div class="level-badge">Lv.<span id="level-text">1</span></div>
          </div>
          <div class="xp-bar-container">
            <div id="xp-bar" class="xp-bar-fill"></div>
          </div>
        </div>

        <!-- 暂停按钮 -->
        <button id="pause-btn" class="pause-btn hidden" aria-label="暂停">
          <svg viewBox="0 0 24 24" width="22" height="22">
            <rect x="5" y="4" width="5" height="16" rx="1" fill="currentColor"/>
            <rect x="14" y="4" width="5" height="16" rx="1" fill="currentColor"/>
          </svg>
        </button>
        
        <!-- Boss 预警横幅 -->
        <div id="boss-warning" class="boss-warning hidden">★ BOSS 来袭 ★</div>
        
        <!-- 任务进度 -->
        <div id="mission-display" class="mission-display hidden"></div>
        
        <!-- 连杀提示 -->
        <div id="combo-display" class="combo-display hidden"></div>
        
        <div class="hud-bottom">
          <div class="hud-bottom-left">
            <div class="health-section">
              <svg class="hp-icon" viewBox="0 0 24 24" width="18" height="18">
                <path d="M12 4C8 4 4 7 4 11c0 5.5 8 10 8 10s8-4.5 8-10c0-4-4-7-8-7z" fill="#ff003c"/>
              </svg>
              <div class="health-bar-container">
                <div id="health-bar" class="health-bar-fill"></div>
              </div>
            </div>
          </div>
          <div class="hud-bottom-center">
            <div class="time-indicator">
              <svg viewBox="0 0 24 24" width="16" height="16" style="vertical-align:middle;opacity:0.6">
                <circle cx="12" cy="12" r="9" fill="none" stroke="#fff" stroke-width="1.5"/>
                <path d="M12 7v5l3 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <span id="time-text">00:00</span>
            </div>
          </div>
          <div class="hud-bottom-right">
            <div class="kill-indicator">
              <svg viewBox="0 0 24 24" width="16" height="16" style="vertical-align:middle;opacity:0.6">
                <circle cx="12" cy="8" r="5" fill="none" stroke="#fff" stroke-width="1.5"/>
                <path d="M5 22c0-4 3-7 7-7s7 3 7 7" fill="none" stroke="#fff" stroke-width="1.5"/>
                <path d="M9 7l2 2 4-4" stroke="#ff003c" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <span id="kill-count">0</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 升级选择 -->
      <div id="level-up-menu" class="screen hidden glassmorphism">
        <div class="levelup-header">
          <div class="levelup-flash">
            <svg viewBox="0 0 40 40" width="48" height="48">
              <path d="M20 2l4 14 14-4-10 10 10 10-14-4-4 14-4-14L2 32l10-10L2 12l14 4L20 2z" fill="#ffcc00" opacity="0.9"/>
              <path d="M20 8l2 8 8-2-6 6 6 6-8-2-2 8-2-8-8 2 6-6-6-6 8 2 2-8z" fill="#ff66aa" opacity="0.7"/>
              <circle cx="20" cy="20" r="3" fill="#fff"/>
            </svg>
          </div>
          <h2>系统升级！</h2>
          <p>选择你的强化模块</p>
        </div>
        <div id="upgrades-container" class="cards-container"></div>
      </div>

      <!-- 暂停画面 -->
      <div id="pause-menu" class="screen hidden glassmorphism">
        <div class="pause-header">
          <svg viewBox="0 0 24 24" width="40" height="40">
            <rect x="5" y="4" width="5" height="16" rx="1" fill="#00f0ff"/>
            <rect x="14" y="4" width="5" height="16" rx="1" fill="#00f0ff"/>
          </svg>
        </div>
        <h2 class="text-accent">系统暂停</h2>
        <p style="color:#888;margin-bottom:1.5rem;font-size:0.9rem">按 P 或点击继续</p>
        <button id="resume-btn" class="glow-on-hover" style="margin-bottom:0.8rem">继续游戏</button>
        <button id="quit-btn" class="glow-on-hover quit-btn">返回主页</button>
      </div>

      <!-- 游戏结束 -->
      <div id="game-over-menu" class="screen hidden glassmorphism">
        <div class="gameover-header">
          <svg viewBox="0 0 24 24" width="40" height="40">
            <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z" fill="none" stroke="#ff003c" stroke-width="1.5"/>
            <path d="M15 9l-6 6M9 9l6 6" stroke="#ff003c" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h2 class="text-danger">系统崩溃</h2>
        <div class="gameover-stats">
          <div class="stat-item">
            <span class="stat-label">存活时间</span>
            <span class="stat-value" id="final-time">00:00</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">击杀数</span>
            <span class="stat-value" id="final-kills">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">达到等级</span>
            <span class="stat-value" id="final-level">1</span>
          </div>
        </div>
        <button id="restart-btn" class="glow-on-hover">重启系统</button>
      </div>

      <!-- 永久强化界面 -->
      <div id="meta-upgrade-menu" class="screen hidden glassmorphism">
        <div class="meta-header">
          <h2><svg viewBox="0 0 24 24" width="24" height="24" style="vertical-align:middle"><circle cx="12" cy="12" r="9" fill="#ffcc00" opacity="0.9"/><text x="12" y="16" text-anchor="middle" font-size="12" fill="#996600" font-weight="bold">$</text></svg> 永久强化</h2>
          <p>金币: <span id="meta-gold-display">0</span></p>
        </div>
        <div id="meta-upgrades-container" class="meta-grid"></div>
        <button id="meta-back-btn" class="glow-on-hover" style="margin-top:1rem">返回</button>
      </div>

      <!-- 队伍大厅 -->
      <div id="team-lobby" class="screen hidden glassmorphism">
        <div class="lobby-header">
          <h2>🎮 队伍大厅</h2>
          <div class="room-code-display">
            房间码: <span id="room-code" class="room-code">------</span>
            <button id="copy-code-btn" class="copy-btn" title="复制">📋</button>
          </div>
        </div>
        <div id="lobby-players" class="lobby-players"></div>
        <div class="lobby-actions">
          <button id="ready-btn" class="glow-on-hover">准备</button>
          <button id="start-team-btn" class="glow-on-hover" style="display:none">开始游戏</button>
          <button id="leave-room-btn" class="glow-on-hover" style="opacity:0.6">离开</button>
        </div>
        <div id="lobby-status" class="lobby-status"></div>
      </div>

      <!-- 加入房间弹窗 -->  
      <div id="join-dialog" class="screen hidden glassmorphism">
        <h2>加入房间</h2>
        <input id="room-code-input" class="room-input" type="text" maxlength="6" placeholder="输入6位房间码" autocomplete="off" />
        <input id="player-name-input" class="room-input" type="text" maxlength="8" placeholder="你的名字" autocomplete="off" />
        <div style="display:flex;gap:10px;margin-top:12px">
          <button id="join-confirm-btn" class="glow-on-hover">加入</button>
          <button id="join-cancel-btn" class="glow-on-hover" style="opacity:0.6">取消</button>
        </div>
        <div id="join-error" style="color:#ff3366;font-size:0.8rem;margin-top:8px"></div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
